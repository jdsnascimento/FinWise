version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: finwise_mysql_prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_prod_data:/var/lib/mysql
    networks:
      - finwise_net

  evolution_api:
    image: atendai/evolution-api:latest
    container_name: finwise_evolution_prod
    restart: always
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      DATABASE_ENABLED: "false"
      REDIS_ENABLED: "false"
    volumes:
      - evolution_prod_data:/app/data
    networks:
      - finwise_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: finwise_backend_prod
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+pymysql://${DB_USER}:${DB_PASSWORD}@mysql:3306/${DB_NAME}
      SECRET_KEY: ${SECRET_KEY}
      EVOLUTION_API_URL: http://evolution_api:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
    depends_on:
      - mysql
      - evolution_api
    networks:
      - finwise_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: finwise_frontend_prod
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - finwise_net

volumes:
  mysql_prod_data:
  evolution_prod_data:

networks:
  finwise_net:
    driver: bridge
